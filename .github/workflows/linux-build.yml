name: Linux Build
on:
    pull_request:
    push:
        branches:
          - main

env:
    BUILD_TYPE: RelWithDebInfo

jobs:
    determine-runner:
        runs-on: ubuntu-latest
        concurrency:
          group: runner-determination-${{ github.workflow }}-${{ github.ref }}
          cancel-in-progress: false
        outputs:
          runner: ${{ steps.set-runner.outputs.use-runner }}
        steps:
          - name: Wait for parallel job startup lag
            run: sleep 15
          - name: Determine runner
            id: set-runner
            uses: mikehardy/runner-fallback-action@v1
            with:
              primary-runner: "self-hosted"
              fallback-runner: "ubuntu-latest"
              fallback-on-error: true
              github-token: ${{ secrets.RUNNER_FALLBACK_TOKEN }}

    build:
        needs: determine-runner
        runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
                submodules: recursive

          - name: Cleanup self-hosted state
            if: runner.environment == 'self-hosted'
            run: |
                docker rm -f prepare_deps_container 2>/dev/null || true
                # Wipe build/ from prior runs. The runner-data volume keeps
                # the workspace between runs, and CMake state / test files
                # left in build/ poison subsequent test runs (e.g. the
                # MigrationDatabase 'newDatabase is not empty' failure).
                rm -rf "$GITHUB_WORKSPACE/build" || true

          - name: Resolve host docker workspace path
            run: |
                if [ "${{ runner.environment }}" = "self-hosted" ]; then
                    # The runner is itself a container with workspace on a
                    # named volume (runner-data:/runner). $GITHUB_WORKSPACE
                    # only exists at that path inside the runner container,
                    # so sibling docker runs using the host daemon can't
                    # bind-mount it. Translate it to the volume's mountpoint
                    # on the host filesystem.
                    RUNNER_CID="$(hostname)"
                    RUNNER_VOLUME="$(docker container inspect "$RUNNER_CID" --format '{{range .Mounts}}{{if eq .Destination "/runner"}}{{.Name}}{{end}}{{end}}' 2>/dev/null)"
                    if [ -z "$RUNNER_VOLUME" ]; then
                        echo "::error::Could not discover the named volume backing /runner inside container $RUNNER_CID"
                        exit 1
                    fi
                    RUNNER_VOLUME_MOUNTPOINT="$(docker volume inspect "$RUNNER_VOLUME" --format '{{.Mountpoint}}')"
                    HOST_WORKSPACE="$RUNNER_VOLUME_MOUNTPOINT/${GITHUB_WORKSPACE#/runner/}"
                    echo "Translated workspace: $GITHUB_WORKSPACE -> $HOST_WORKSPACE"
                else
                    HOST_WORKSPACE="$GITHUB_WORKSPACE"
                fi
                echo "HOST_WORKSPACE=$HOST_WORKSPACE" >> "$GITHUB_ENV"

          - name: Debug - print env
            run: env

          - name: Get/build image to use for building & testing
            run: |
                set -x  # print executed commands

                echo Some debug data
                id
                uname -a
                lsb_release -a

                # cat ${{github.workspace}}/tools/scripts/github_env_linux >> "$GITHUB_ENV"

                # get base image for this distro (or build configuration, in case with skymp-deps)
                base_image="`tools/scripts/deps_linux/ubuntu-vcpkg-deps.sh --get-image-uri`"

                docker rm -f prepare_deps_container 2>/dev/null || true

                old_buildimage_id="`docker image inspect localhost/buildimage --format '{{.Id}}' 2>/dev/null || true`"

                docker run \
                  --name prepare_deps_container \
                  -v "$HOST_WORKSPACE:/src" \
                  -w "/src" \
                  -e "CI=$CI" \
                  -e "CREATE_UID=`id -u`" \
                  "$base_image" \
                  'tools/scripts/deps_linux/ubuntu-vcpkg-deps.sh' '--ensure-deps-noninteractive'

                docker commit prepare_deps_container localhost/buildimage
                docker rm -f prepare_deps_container

                if [ -n "$old_buildimage_id" ]; then
                  new_buildimage_id="`docker image inspect localhost/buildimage --format '{{.Id}}'`"
                  if [ "$old_buildimage_id" != "$new_buildimage_id" ]; then
                    docker image rm "$old_buildimage_id" 2>/dev/null || true
                  fi
                fi

          - name: Debug - check build tools
            run:
              docker run --rm -v "$HOST_WORKSPACE:/src" -w /src -u skymp localhost/buildimage bash -c "$script"
            env:
              script: |
                print_info_unsafe() {
                  echo .
                  echo .
                  echo "=== Checking $1 ==="
                  out="`which $1`"
                  ret="$?"
                  if [ "$ret" != 0 -o -z "$out" ]; then
                    echo "Which exited with $ret $out"
                    return
                  fi
                  ls -lh "$out"
                  echo "version call:"
                  "$out" --version
                }

                print_info() {
                  print_info_unsafe "$@" || true
                }

                print_info clang++
                print_info clang++-15
                print_info cmake
                print_info ninja
                print_info node
                print_info yarn
                print_info git
                print_info zip
                print_info unzip
                print_info curl

                echo .
                echo .
                echo === misc ===
                echo "current dir is $PWD"
                echo /src:
                ls -lh /src

                echo .
                echo .
                echo === env ===
                ./build.sh --print-env

          # Download Skyrim SE data files
          - uses: suisei-cn/actions-download-file@v1
            name: Download Skyrim.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Skyrim.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            name: Download Update.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Update.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            name: Download Dawnguard.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Dawnguard.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            name: Download HearthFires.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/HearthFires.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            name: Download Dragonborn.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Dragonborn.esm"
              target: ${{github.workspace}}/skyrim_data_files/

          - name: Prepare
            run: |
              docker run --rm -v "$HOST_WORKSPACE:/src" -w /src -u root localhost/buildimage \
                chown -R skymp:skymp /src

          - name: CMake Configure
            id: cmake_configure
            run: |
              docker run --rm -v "$HOST_WORKSPACE:/src" -w /src -u skymp localhost/buildimage \
                ./build.sh --configure \
                -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
                -DUNIT_DATA_DIR="/src/skyrim_data_files"

          - name: Upload vcpkg logs
            if: always()
            uses: actions/upload-artifact@v7
            with:
              name: ubuntu-vcpkg-deps_vcpkg_logs
              path: |
                ${{github.workspace}}/build/vcpkg-*.log
                ${{github.workspace}}/third_party/vcpkg/buildtrees/**/*.log

          # Workaround for https://github.com/actions/upload-artifact/issues/785 and 769
          - name: Rename compile_commands.json
            run: |
              cd '${{ github.workspace }}/build'
              ln -s compile_commands.json 'ubuntu-vcpkg-deps_compile_commands.json'

          - name: Upload compile_commands.json
            uses: actions/upload-artifact@v7
            with:
                name: ubuntu-vcpkg-deps_compile_commands.json
                path: ${{ github.workspace }}/build/ubuntu-vcpkg-deps_compile_commands.json
                archive: false

          - name: Build
            run: |
              docker run --rm -v "$HOST_WORKSPACE:/src" -w /src -u skymp localhost/buildimage \
                ./build.sh --build

          - name: Prepare dist.tar.gz
            run: |
              docker run --rm -v "$HOST_WORKSPACE:/src" -w /src/build -u skymp localhost/buildimage \
                tar czvf dist.tar.gz dist

          # Workaround for https://github.com/actions/upload-artifact/issues/785 and 769
          - name: Rename dist.tar.gz
            run: |
              cd '${{ github.workspace }}/build'
              ln -s dist.tar.gz 'ubuntu-vcpkg-deps_dist.tar.gz'

          - name: Upload dist.tar.gz
            uses: actions/upload-artifact@v7
            with:
              name: ubuntu-vcpkg-deps_dist.tar.gz
              path: ${{ github.workspace }}/build/ubuntu-vcpkg-deps_dist.tar.gz
              archive: false

          - name: Test
            run: |
              docker run --rm -v "$HOST_WORKSPACE:/src" -w /src/build -u skymp localhost/buildimage \
                ctest -C ${{env.BUILD_TYPE}} --verbose --output-on-failure
