name: Formatting check
on: [push, pull_request]

env:
  LINTER_URL: https://raw.githubusercontent.com/skyrim-multiplayer/linter/2d4a9a96989b066c9cf1fb70ae1169eec106d45e/dist/linter.mjs
  LINTER_SHA256: b3727c7cbf9787f5b7b91bd340b5553d3c1f51cb176dd362d754aa3579667040

jobs:
    determine-runner:
        runs-on: ubuntu-latest
        concurrency:
          group: runner-determination-${{ github.workflow }}-${{ github.ref }}
          cancel-in-progress: false
        outputs:
          runner: ${{ steps.set-runner.outputs.use-runner }}
        steps:
          - name: Wait for parallel job startup lag
            run: sleep 15
          - name: Determine runner
            id: set-runner
            uses: mikehardy/runner-fallback-action@v1
            with:
              primary-runner: "self-hosted"
              fallback-runner: "ubuntu-latest"
              fallback-on-error: true
              github-token: ${{ secrets.RUNNER_FALLBACK_TOKEN }}

    formatting-check:
        name: Formatting Check
        needs: determine-runner
        runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: Mark workspace as safe for git
            if: runner.environment == 'self-hosted'
            run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20'

          - name: Download linter
            run: |
              mkdir -p .linter
              curl -fsSL "$LINTER_URL" -o .linter/linter.mjs
              echo "$LINTER_SHA256  .linter/linter.mjs" | sha256sum -c -

          - name: Run linters
            run: node .linter/linter.mjs --lint --no-path --mode gha
